<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Клиенты</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <a href="index.html" class="back-link">← На главную</a>
            <h1>Управление клиентами</h1>
        </header>

        <div id="notifications"></div>

        <div class="section-header">
            <h2>Список клиентов</h2>
            <button class="btn btn-primary" onclick="showAddForm()">+ Новый клиент</button>
        </div>

        <div id="formContainer" class="form-container" style="display: none;">
            <h3 id="formTitle">Новый клиент</h3>
            <form id="clientForm">
                <input type="hidden" id="userId">

                <div class="form-group">
                    <label for="fio">ФИО:</label>
                    <input type="text" id="fio" required>
                </div>

                <div class="form-group">
                    <label for="phone">Телефон:</label>
                    <input type="tel" id="phone" required>
                </div>

                <div class="form-group">
                    <label for="login">Логин:</label>
                    <input type="text" id="login" required>
                </div>

                <div class="form-group">
                    <label for="password">Пароль:</label>
                    <input type="password" id="password" required>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Сохранить</button>
                    <button type="button" class="btn" onclick="hideForm()">Отмена</button>
                </div>
            </form>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>ФИО</th>
                        <th>Телефон</th>
                        <th>Логин</th>
                        <th>Действия</th>
                    </tr>
                </thead>
                <tbody id="clientsTableBody">
                    <tr>
                        <td colspan="5">Загрузка...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="script.js"></script>
    <script>document.addEventListener('DOMContentLoaded', loadClients);

        async function loadClients() {
            try {
                const clients = await apiRequest('/api/clients');
                const tbody = document.getElementById('clientsTableBody');

                if (clients.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5">Нет клиентов</td></tr>';
                    return;
                }

                tbody.innerHTML = clients.map(client => `
                    <tr>
                        <td>${client.userID}</td>
                        <td>${client.fio}</td>
                        <td>${client.phone}</td>
                        <td>${client.login}</td>
                        <td class="actions">
                            <button onclick="editClient(${client.userID})"></button>
                            <button onclick="deleteClient(${client.userID})"></button>
                        </td>
                    </tr>
                `).join('');
            } catch (error) {
                tbody.innerHTML = '<tr><td colspan="5">Ошибка загрузки</td></tr>';
            }
        }

        function showAddForm() {
            document.getElementById('formTitle').textContent = 'Новый клиент';
            document.getElementById('clientForm').reset();
            document.getElementById('userId').value = '';
            document.getElementById('formContainer').style.display = 'block';
        }

        function hideForm() {
            document.getElementById('formContainer').style.display = 'none';
        }

        async function editClient(id) {
            try {
                const client = await apiRequest(`/api/clients/${id}`);

                document.getElementById('formTitle').textContent = 'Редактирование клиента';
                document.getElementById('userId').value = client.userID;
                document.getElementById('fio').value = client.fio;
                document.getElementById('phone').value = client.phone;
                document.getElementById('login').value = client.login;
                document.getElementById('password').value = client.password;

                document.getElementById('formContainer').style.display = 'block';
            } catch (error) {
                showNotification('Ошибка загрузки', 'error');
            }
        }

        document.getElementById('clientForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const clientData = {
                userID: document.getElementById('userId').value ? parseInt(document.getElementById('userId').value) : 0,
                fio: document.getElementById('fio').value,
                phone: document.getElementById('phone').value,
                login: document.getElementById('login').value,
                password: document.getElementById('password').value
            };

            try {
                if (clientData.userID) {
                    await apiRequest('/api/clients', 'PUT', clientData);
                    showNotification('Клиент обновлен');
                } else {
                    delete clientData.userID;
                    await apiRequest('/api/clients', 'POST', clientData);
                    showNotification('Клиент добавлен');
                }

                hideForm();
                loadClients();
            } catch (error) {
                showNotification('Ошибка сохранения', 'error');
            }
        });

        async function deleteClient(id) {
            if (!confirm('Удалить клиента?')) return;

            try {
                await apiRequest(`/api/clients/${id}`, 'DELETE');
                showNotification('Клиент удален');
                loadClients();
            } catch (error) {
                showNotification('Ошибка удаления', 'error');
            }
        }</script>

</body>
